name: Hint mode bug
description: Report a hint placement, duplicate hint, or missing hint issue
labels: ["bug", "hints"]
body:
  - type: markdown
    attributes:
      value: |
        ## How to file a great hint bug

        The more precise your report, the faster the fix. An AI agent reads these issues directly, so structured information helps it reproduce and fix the problem automatically.

  - type: dropdown
    id: issue-type
    attributes:
      label: What's wrong?
      options:
        - Duplicate hints (same element gets multiple hints)
        - Missing hint (interactive element has no hint)
        - Hint on wrong element (hint lands on a non-interactive element)
        - Hint positioned incorrectly (hint is in the wrong place)
        - Other
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: The page URL where the issue occurs. Must be a publicly accessible page.
      placeholder: https://example.com/page
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: |
        A screenshot showing the problem. Activate hint mode (press `f`) and take a screenshot that shows the incorrect behavior.

        **Tip:** If the issue is subtle, annotate the screenshot — circle the problem area or add an arrow.

        Drag and drop the image here.
    validations:
      required: true

  - type: textarea
    id: dom
    attributes:
      label: DOM snippet
      description: |
        The relevant DOM subtree around the problem element(s).

        **How to get it:**
        1. Right-click the problem element → Inspect
        2. In the Elements panel, find the nearest meaningful ancestor (the `<li>`, `<nav>`, or container — not `<body>`)
        3. Right-click that ancestor → Copy → Copy outerHTML
        4. Paste here

        **Keep it minimal.** Strip siblings and attributes that aren't relevant. The smaller the snippet, the faster the fix. A good snippet is 5–20 lines, not 200.
      render: html
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: |
        Be specific about which element(s) should or shouldn't get hints.

        **Good:** "The `<a href="/profile">` link inside the card should get a hint, but instead the outer `<div>` wrapper gets one."
        **Bad:** "Hints are wrong."
      placeholder: |
        Expected: Only the inner <a> link gets a hint.
        Actual: Both the <a> and its parent <div role="button"> get duplicate hints.
    validations:
      required: true
