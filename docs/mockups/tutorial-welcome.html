<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabi — Welcome</title>
<style>
  :root {
    --tabi-bg: #1e1e22;
    --tabi-color: #e0e0e0;
    --tabi-color-secondary: #888;
    --tabi-muted: rgba(255, 255, 255, 0.4);
    --tabi-accent: #0a84ff;
    --tabi-border: rgba(255, 255, 255, 0.08);
    --hint-bg: linear-gradient(to bottom, #fff785, #ffc542);
    --hint-border: #c38a22;
    --hint-color: #333;
    --hint-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --tabi-bg: #f8f8fa;
      --tabi-color: #333;
      --tabi-color-secondary: #888;
      --tabi-muted: rgba(0, 0, 0, 0.4);
      --tabi-accent: #007aff;
      --tabi-border: rgba(0, 0, 0, 0.08);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: var(--tabi-bg);
    color: var(--tabi-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 247, 133, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(255, 197, 66, 0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: hero-in 800ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes hero-in {
    0% { opacity: 0; transform: translateY(24px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Mascot — uses the actual icon asset ── */
  .mascot-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  .mascot {
    width: 180px;
    height: 180px;
    border-radius: 38px;
    box-shadow:
      0 12px 48px rgba(255, 197, 66, 0.15),
      0 4px 16px rgba(0, 0, 0, 0.2);
    transition: transform 600ms cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 600ms ease;
  }

  .mascot.glow {
    transform: scale(1.06);
    box-shadow:
      0 0 60px rgba(255, 247, 133, 0.35),
      0 0 120px rgba(255, 197, 66, 0.15),
      0 12px 48px rgba(255, 197, 66, 0.2);
  }

  .title {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  /* ── The "begin" link that tabi will discover and hint ── */
  .begin {
    display: inline-block;
    margin-top: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--tabi-border);
    color: var(--tabi-color-secondary);
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: background 200ms ease;
    animation: prompt-in 600ms 400ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .begin:hover { background: rgba(255, 255, 255, 0.07); }

  @media (prefers-color-scheme: light) {
    .begin {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.08);
    }
    .begin:hover { background: rgba(0, 0, 0, 0.06); }
  }

  @keyframes prompt-in {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .prompt {
    font-size: 14px;
    color: var(--tabi-muted);
    margin-top: 20px;
    animation: prompt-in 600ms 600ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .prompt kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    border-radius: 3px;
    box-shadow: var(--hint-shadow);
    color: var(--hint-color);
    font: bold 11px/1.4 "Helvetica Neue", Helvetica, Arial, sans-serif;
    text-transform: uppercase;
    vertical-align: 1px;
  }

  .step-dots {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    animation: prompt-in 600ms 800ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--tabi-muted);
  }

  .dot.active {
    background: var(--tabi-accent);
    transform: scale(1.3);
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="mascot-wrap">
      <!--
        Use the actual icon asset. Path is relative — in the Swift app's
        WKWebView, this resolves to the bundle resources directory.
      -->
      <img class="mascot" id="mascot"
           src="../../Tabi/Safari Extension/Resources/images/icon-256.png"
           alt="Tabi">
    </div>

    <div class="title">Tabi</div>

    <!--
      This is the clickable element tabi will discover.
      When the user presses F, the extension places a hint under it.
      Typing the hint letters navigates to lesson 1.
    -->
    <a href="tutorial-hints.html" class="begin" role="button">
      Begin
    </a>

    <div class="prompt">
      Press <kbd>F</kbd> then type the hint
    </div>
  </div>

  <div class="step-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</body>
</html>
