name: Tabi
options:
  bundleIdPrefix: com.brokenalarms
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.3"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: F73P768296

schemes:
  Tabi:
    build:
      targets:
        Tabi: all
        Tabi Extension: all
    run:
      executable: Tabi

targets:
  Tabi:
    type: application
    platform: macOS
    sources:
      - path: Tabi/Host App
      - path: Tabi/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brokenalarms.tabi
        CODE_SIGN_ENTITLEMENTS: Tabi/Host App/Tabi.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Tabi
        GENERATE_INFOPLIST_FILE: true
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
    dependencies:
      - target: Tabi Extension
        embed: true
        codeSign: true
        copy:
          destination: plugins
          subpath: ""

  Tabi Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: Tabi/Safari Extension
        excludes:
          - "Resources/**"
      - path: Tabi/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brokenalarms.tabi.Extension
        CODE_SIGN_ENTITLEMENTS: Tabi/Safari Extension/TabiExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Tabi/Safari Extension/Info.plist
        OTHER_LDFLAGS: ["-framework", "SafariServices"]
    preBuildScripts:
      - name: Compile TypeScript
        basedOnDependencyAnalysis: false
        script: |
          cd "$PROJECT_DIR"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          npm run build
        outputFiles:
          - $(PROJECT_DIR)/Tabi/Safari Extension/Resources/background.js
          - $(PROJECT_DIR)/Tabi/Safari Extension/Resources/content.js
          - $(PROJECT_DIR)/Tabi/Safari Extension/Resources/popup.js
    postBuildScripts:
      - name: Copy Extension Resources
        script: |
          rsync -a --delete "${PROJECT_DIR}/Tabi/Safari Extension/Resources/" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
        inputFiles:
          - $(PROJECT_DIR)/Tabi/Safari Extension/Resources/
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/manifest.json
      - name: Validate Extension Bundle
        script: |
          PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          # NSExtension dictionary is required for Safari to recognize the extension
          if ! /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$PLIST" &>/dev/null; then
            echo "error: NSExtension dictionary missing from extension Info.plist. Safari will silently ignore this extension."
            echo "error: Ensure Tabi/Safari Extension/Info.plist exists and contains the NSExtension dictionary."
            exit 1
          fi
          # Verify manifest.json was copied
          RESOURCES_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          if [ ! -f "$RESOURCES_DIR/manifest.json" ]; then
            echo "error: manifest.json missing from extension bundle Resources. The extension will not load in Safari."
            exit 1
          fi
          echo "Extension bundle validation passed."
          touch "${DERIVED_FILE_DIR}/validate_extension.stamp"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/manifest.json
        outputFiles:
          - $(DERIVED_FILE_DIR)/validate_extension.stamp
