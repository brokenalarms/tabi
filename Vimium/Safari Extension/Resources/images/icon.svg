<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff785"/>
      <stop offset="100%" stop-color="#ffc542"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Shadow (contained within viewBox) -->
  <rect x="8" y="10" width="496" height="494" rx="112" ry="112" fill="rgba(0,0,0,0.12)"/>
  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="112" ry="112" fill="#c38a22"/>
  <!-- Background -->
  <rect x="8" y="8" width="496" height="496" rx="109" ry="109" fill="url(#bg)"/>
  <!-- Inner shine -->
  <rect x="8" y="8" width="496" height="248" rx="109" ry="109" fill="url(#shine)"/>
  <!-- Text - centered using x=50% and dy for optical centering -->
  <text x="250" y="280" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', 'Helvetica', sans-serif"
        font-size="280" font-weight="800" fill="#302505"
        letter-spacing="-12">Vi</text>
</svg>
