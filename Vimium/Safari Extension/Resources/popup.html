<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup">
    <h1>Vimium</h1>

    <div class="setting">
      <label class="setting-label">Key Binding Mode</label>
      <div class="segmented" id="keyBindingMode">
        <button data-value="location" class="active">By Position</button>
        <button data-value="character">By Character</button>
      </div>
      <p class="hint">Position matches physical key location. Character matches what you type.</p>
    </div>

    <hr>

    <div class="setting">
      <label class="setting-label">Hints (f / F)</label>
      <div class="segmented" id="enableHints">
        <button data-value="true" class="active">On</button>
        <button data-value="false">Off</button>
      </div>
    </div>

    <hr>

    <div class="setting">
      <label class="setting-label">Hint Style</label>
      <div class="segmented" id="enablePointerTails">
        <button data-value="false" class="active">Inline</button>
        <button data-value="true">Floating</button>
      </div>
      <p class="hint">Inline places hints over text. Floating adds connector tails below links.</p>
    </div>

    <hr>

    <div class="setting">
      <label class="setting-label">Theme</label>
      <div class="segmented" id="theme">
        <button data-value="classic">Classic</button>
        <button data-value="dark">Dark</button>
        <button data-value="light">Light</button>
        <button data-value="auto" class="active">Auto</button>
      </div>
      <p class="hint">Classic yellow, dark, light, or auto (contrasts with page background).</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
